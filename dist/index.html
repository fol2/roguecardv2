<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Spirebound — A Roguelite Deckbuilder</title>
  <meta name="description" content="Climb the Spire. Build your deck. Defy the Void. A roguelite card game in three acts." />
  <meta property="og:title" content="Spirebound" />
  <meta property="og:description" content="Climb the Spire. Build your deck. Defy the Void." />
  <meta property="og:image" content="/og.png" />
  <meta name="theme-color" content="#0b0e1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spirebound" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon-180.png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🃏</text></svg>" />
  <script type="module" crossorigin src="/assets/index-CpZHSV-D.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BIDS2-F-.css">
</head>
<body>
  <div id="stage">
    <canvas id="bg3d"></canvas>
    <div id="vignette"></div>
    <div id="grain"></div>
    <div id="shake">
      <div id="screen"></div>
      <canvas id="mesh"></canvas>
      <div id="lantern"></div>
      <div id="hud"></div>
    </div>
    <svg id="aim"></svg>
    <!-- shared silhouette outline filters for card-hover aim rings -->
    <svg width="0" height="0" aria-hidden="true" style="position:absolute;overflow:hidden">
      <defs>
        <filter id="aim-outline-atk" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
          <feMorphology in="SourceAlpha" operator="dilate" radius="2" result="dilated"/>
          <feComposite in="dilated" in2="SourceAlpha" operator="out" result="ring"/>
          <feFlood flood-color="#fff6ec" flood-opacity="1" result="fill"/>
          <feComposite in="fill" in2="ring" operator="in"/>
        </filter>
        <filter id="aim-outline-self" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
          <feMorphology in="SourceAlpha" operator="dilate" radius="2" result="dilated"/>
          <feComposite in="dilated" in2="SourceAlpha" operator="out" result="ring"/>
          <feFlood flood-color="#fff6ec" flood-opacity="1" result="fill"/>
          <feComposite in="fill" in2="ring" operator="in"/>
        </filter>
        <!-- sharp status-icon silhouette (same dilate language as aim rings; 0.9px) -->
        <filter id="status-outline" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
          <feMorphology in="SourceAlpha" operator="dilate" radius="0.9" result="dilated"/>
          <feFlood flood-color="#000000" flood-opacity="1" result="black"/>
          <feComposite in="black" in2="dilated" operator="in" result="outline"/>
          <feMerge>
            <feMergeNode in="outline"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <!-- soft-eat light alpha fringe on DOM sprites (mesh path does this in BODY_FRAG) -->
        <filter id="alpha-erode" x="-2%" y="-2%" width="104%" height="104%" color-interpolation-filters="sRGB">
          <feMorphology in="SourceAlpha" operator="erode" radius="0.65" result="eroded"/>
          <feComposite in="SourceGraphic" in2="eroded" operator="in"/>
        </filter>
      </defs>
    </svg>
    <canvas id="vfx"></canvas>
    <div id="floaties"></div>
    <div id="overlay"></div>
    <div id="wipe"></div>
    <div id="transit"></div>
    <div id="tooltip"></div>
  </div>
</body>
</html>
