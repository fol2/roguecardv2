<!DOCTYPE html>
<html>
<head>
  <title>QA HUD Relic Packing Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #222; color: #0f0; }
    button { margin: 10px 0; padding: 10px; font-size: 16px; }
    pre { background: #000; padding: 10px; border: 1px solid #0f0; overflow: auto; }
    .result { margin: 20px 0; }
  </style>
</head>
<body>
  <h1>HUD Relic Packing QA</h1>
  
  <button onclick="runTestA()">Run Test A (No Omen)</button>
  <button onclick="runTestB()">Run Test B (With Omen)</button>
  <button onclick="openMain()">Open Main Game</button>
  
  <div class="result">
    <h2>Results:</h2>
    <pre id="output">Click buttons to run tests...</pre>
  </div>

  <script>
    function openMain() {
      window.location.href = '/?mesh=0&shape=desktop-landscape';
    }

    async function runTestA() {
      const output = document.getElementById('output');
      output.textContent = 'Running Test A...\n';
      
      // Open main game in new window
      const win = window.open('/?mesh=0&shape=desktop-landscape', '_blank');
      
      output.textContent += 'Waiting for game to load...\n';
      await new Promise(r => setTimeout(r, 3000));
      
      // Run test
      try {
        win.eval(`
          const sp = window.spirebound;
          sp.S.run = sp.E.newRun(20260706, { aspect: 0, reveals: [] });
          sp.S.run.omens = [null];
          sp.S.run.player.relics = ['emberHeart', 'ironTalisman', 'basaltIdol', 'duskmirror'];
          sp.show('map');
        `);
        
        await new Promise(r => setTimeout(r, 1000));
        
        const result = win.eval(`
          (() => {
            const bar = document.querySelector('#relicbar');
            const omen = document.querySelector('#omen-slot');
            const relics = [...bar.querySelectorAll('.hud-relic')];
            const rects = relics.map(r => r.getBoundingClientRect());
            const gaps = [];
            for (let i=1;i<rects.length;i++) gaps.push(Math.round(rects[i].left - rects[i-1].right));
            return {
              omenEmpty: omen.childElementCount,
              omenDisplay: getComputedStyle(omen).display,
              barLeft: bar.style.left,
              cssGap: getComputedStyle(bar).gap,
              iconGapsPx: gaps,
              relicCount: relics.length,
            };
          })()
        `);
        
        output.textContent += '\nTest A Results:\n' + JSON.stringify(result, null, 2);
      } catch (e) {
        output.textContent += '\nError: ' + e.message;
      }
    }

    async function runTestB() {
      const output = document.getElementById('output');
      output.textContent = 'Running Test B...\n';
      
      const win = window.open('/?mesh=0&shape=desktop-landscape', '_blank');
      
      output.textContent += 'Waiting for game to load...\n';
      await new Promise(r => setTimeout(r, 3000));
      
      try {
        win.eval(`
          const sp = window.spirebound;
          sp.S.run = sp.E.newRun(20260706, { aspect: 0, reveals: ['omens'] });
          sp.S.run.omens = ['thinGlass'];
          sp.S.run.player.relics = ['emberHeart', 'ironTalisman', 'basaltIdol'];
          sp.show('map');
        `);
        
        await new Promise(r => setTimeout(r, 1000));
        
        const result = win.eval(`
          (() => {
            const bar = document.querySelector('#relicbar');
            const omen = document.querySelector('#omen-slot');
            const relics = [...bar.querySelectorAll('.hud-relic')];
            const rects = relics.map(r => r.getBoundingClientRect());
            const gaps = [];
            for (let i=1;i<rects.length;i++) gaps.push(Math.round(rects[i].left - rects[i-1].right));
            return {
              omenEmpty: omen.childElementCount,
              omenDisplay: getComputedStyle(omen).display,
              barLeft: bar.style.left,
              cssGap: getComputedStyle(bar).gap,
              iconGapsPx: gaps,
              relicCount: relics.length,
            };
          })()
        `);
        
        output.textContent += '\nTest B Results:\n' + JSON.stringify(result, null, 2);
      } catch (e) {
        output.textContent += '\nError: ' + e.message;
      }
    }
  </script>
</body>
</html>
