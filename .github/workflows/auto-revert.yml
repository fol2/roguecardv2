# Auto-revert safety net for the PR-smoke / main-full CI trade-off.
# When a push to main fails the full ci gate, open a revert PR.
#
# Known limitation: PRs created by GITHUB_TOKEN do not trigger the ci
# workflow; a human (or the orchestrator agent) closes/reopens or pushes
# to the branch to get checks, then merges. That is acceptable — this is
# the rare path.

name: auto-revert

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  revert:
    name: revert failed main push
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Open revert PR or manual-revert issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_SHA: ${{ github.event.workflow_run.head_sha }}
          FAILED_RUN_URL: ${{ github.event.workflow_run.html_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SHORT_SHA="${FAILED_SHA:0:7}"
          BRANCH="revert-${SHORT_SHA}"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Revert branch $BRANCH already exists — idempotent exit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          REVERT_ARGS=(--no-edit)
          if git rev-parse "${FAILED_SHA}^2" >/dev/null 2>&1; then
            REVERT_ARGS+=(-m 1)
          fi

          if ! git revert "${REVERT_ARGS[@]}" "$FAILED_SHA"; then
            git revert --abort 2>/dev/null || true
            gh issue create \
              --repo "$REPO" \
              --title "main CI red at ${SHORT_SHA} — manual revert needed" \
              --body "$(cat <<EOF
          The \`ci\` workflow failed on main at \`${FAILED_SHA}\`.

          Failed run: ${FAILED_RUN_URL}

          Automatic \`git revert\` conflicted. Please revert manually.
          EOF
          )"
            exit 0
          fi

          # GITHUB_TOKEN cannot push commits that touch .github/workflows
          # (no `workflows` permission) — fall back to an issue for those.
          if ! git push origin "HEAD:refs/heads/${BRANCH}"; then
            gh issue create \
              --repo "$REPO" \
              --title "main CI red at ${SHORT_SHA} — manual revert needed (push rejected)" \
              --body "$(cat <<EOF
          The \`ci\` workflow failed on main at \`${FAILED_SHA}\`.

          Failed run: ${FAILED_RUN_URL}

          The automatic revert could not be pushed (likely because the revert
          touches \`.github/workflows/\`, which \`GITHUB_TOKEN\` may not modify).
          Please revert manually.
          EOF
          )"
            exit 0
          fi

          gh pr create \
            --repo "$REPO" \
            --base main \
            --head "$BRANCH" \
            --title "auto-revert: main CI red at ${SHORT_SHA}" \
            --body "$(cat <<EOF
          Automatic revert of \`${FAILED_SHA}\` after the \`ci\` workflow failed on main.

          Failed run: ${FAILED_RUN_URL}

          **Note:** PRs opened by \`GITHUB_TOKEN\` do not re-trigger \`ci\`. Close/reopen or push an empty commit on this branch to get checks, then merge.
          EOF
          )"
