# Auto-revert safety net for the PR-smoke / main-full CI trade-off.
# When a push to main fails the full `ci` gate, revert it straight back to a
# green main with ZERO human touches — matching the trunk-flow philosophy.
#
# How the zero-touch path works (SDLC redesign Phase 3):
#   secrets.AUTO_REVERT_PAT is a PAT owned by the repo admin. Unlike
#   GITHUB_TOKEN it (a) re-triggers `ci` on its push, (b) can carry `workflow`
#   scope so it may revert .github/workflows changes, and (c) bypasses main's
#   required-status-checks because enforce_admins is false. So the revert
#   commit lands on main directly and `ci` re-runs on it (green — it restores
#   the prior state).
#
# Fallbacks stay honest — a human is pulled in only for the two cases a machine
# cannot resolve: a revert that CONFLICTS, and a red main whose head is ITSELF
# an auto-revert (the underlying red is not a single revertable commit — the
# loop guard turns this into an issue instead of reverting forever).
#
# If AUTO_REVERT_PAT is absent/expired, the push fails auth and we fall back to
# an issue — i.e. it degrades to the old semi-manual behaviour, never worse.

name: auto-revert

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  revert:
    name: revert failed main push
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Serialize per failing commit: duplicate at-least-once `workflow_run` events
    # (and the extra events from our own self-heal re-runs) must not double-revert.
    concurrency:
      group: auto-revert-${{ github.event.workflow_run.head_sha }}
      cancel-in-progress: false
    steps:
      # Hybrid classifier for a red main. Two lane families are browser-infra-
      # flaky here and were false-reverting good work — `e2e aux` (bfeditor-disk
      # is retries:0 and races a Vite HMR restart on slow CI) and the mobile-
      # WebKit lanes (renderer crashes: "internal error", probe-undefined after
      # reload, screens hang). The classifier reduces the failure to its LEAF
      # lanes and decides three ways:
      #   * a SOLID lane failed      -> revert immediately, on ANY attempt (no
      #                                 re-run, no added latency — it's a real red).
      #   * ONLY known-flaky lanes   -> RE-RUN the failed jobs to let the flake
      #                                 self-heal; if it still only-flakes after
      #                                 two re-runs, open an issue (never a silent
      #                                 revert — a runner-correlated infra flake is
      #                                 not a "fails N times = real bug" signal).
      #   * no failed leaves surfaced -> open an issue (unknown red; never revert).
      - name: Classify the red — revert / rerun / hold
        id: classify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          FAILED_RUN_URL: ${{ github.event.workflow_run.html_url }}
          REPO: ${{ github.repository }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          set -euo pipefail
          # Aggregate/gate jobs (unit, e2e, e2e nonvisual, p2-base) fail only as a
          # CONSEQUENCE of a leaf lane — subtract them so we compare real lanes.
          FAILED_LEAVES="$(gh api --paginate "repos/${REPO}/actions/runs/${RUN_ID}/jobs" \
            --jq '[.jobs[] | select(.conclusion=="failure") | .name] - ["unit","e2e","e2e nonvisual","p2-base"] | unique')"
          # The lanes that are known browser-infra-flaky here (see comment above).
          NON_FLAKY="$(printf '%s' "${FAILED_LEAVES}" | jq -c '. - ["e2e aux","e2e webkit core-ipad","e2e webkit core-iphone","e2e webkit screens","e2e webkit lab"]')"
          echo "failed leaf lanes: ${FAILED_LEAVES} ; non-flaky among them: ${NON_FLAKY}"
          if [ "${NON_FLAKY}" != "[]" ]; then
            # A solid lane failed → real regression. Revert now, any attempt.
            echo "action=revert" >> "${GITHUB_OUTPUT}"
          elif [ "${FAILED_LEAVES}" = "[]" ]; then
            # No named leaf failed — the jobs API didn't surface the cause. Never
            # read an empty leaf list as "all-flaky"; a human must look.
            gh issue create --repo "${REPO}" \
              --title "main CI red — no failed leaf lanes surfaced (no auto-revert)" \
              --body "The \`ci\` run failed on main but no failed leaf lane was surfaced by the jobs API, so auto-revert cannot classify it. A human should assess: ${FAILED_RUN_URL}"
            echo "action=hold" >> "${GITHUB_OUTPUT}"
          elif [ "${RUN_ATTEMPT}" -le 2 ]; then
            # Only known-flaky lanes failed → let it self-heal by re-running the
            # failed jobs (attempt 1 → 2, or 2 → 3). Re-evaluated on the next attempt.
            echo "action=rerun" >> "${GITHUB_OUTPUT}"
          else
            # Still only-flaky after two re-runs (attempt ≥ 3) → escalate to a
            # human, never revert (correlated infra flake, not a real bug).
            gh issue create --repo "${REPO}" \
              --title "main CI red — only known-flaky lanes failed after 2 re-runs (no auto-revert)" \
              --body "Every failed leaf lane was a known browser-infra flake (\`${FAILED_LEAVES}\`) and it did not clear after two re-runs. Auto-revert stood down to avoid false-reverting good work; a human should assess: ${FAILED_RUN_URL}"
            echo "action=hold" >> "${GITHUB_OUTPUT}"
          fi

      - name: Re-run failed jobs to let a flaky-only red self-heal
        if: steps.classify.outputs.action == 'rerun'
        env:
          GH_TOKEN: ${{ secrets.AUTO_REVERT_PAT }}   # PAT, not GITHUB_TOKEN — GITHUB_TOKEN would suppress the downstream workflow_run
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          # Duplicate at-least-once events can fire this twice; a second rerun call on an already-running attempt is a harmless no-op.
          gh run rerun "${RUN_ID}" --failed || true
          echo "Re-ran failed jobs of ${RUN_ID}; auto-revert re-evaluates on the next attempt."

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.classify.outputs.action == 'revert'
        with:
          ref: main
          fetch-depth: 0
          # PAT (not GITHUB_TOKEN) so the revert push re-triggers `ci`, may touch
          # workflow files, and bypasses branch protection as the admin owner.
          token: ${{ secrets.AUTO_REVERT_PAT }}
          persist-credentials: true

      - name: Revert the failed commit straight to main
        if: steps.classify.outputs.action == 'revert'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_SHA: ${{ github.event.workflow_run.head_sha }}
          FAILED_RUN_URL: ${{ github.event.workflow_run.html_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SHORT_SHA="${FAILED_SHA:0:7}"

          open_issue () {
            gh issue create --repo "$REPO" \
              --title "main CI red at ${SHORT_SHA} — manual revert needed$1" \
              --body "The \`ci\` workflow failed on main at \`${FAILED_SHA}\`.

          Failed run: ${FAILED_RUN_URL}

          $2"
          }

          git config user.name "auto-revert-bot"
          git config user.email "actions@github.com"

          # Loop guard: never auto-revert an auto-revert. If the failed head is
          # itself a revert, the underlying red is not a single revertable
          # commit — reverting it would re-apply the bad change and loop forever.
          SUBJECT="$(git log -1 --format=%s "$FAILED_SHA")"
          case "$SUBJECT" in
            "auto-revert:"* | "Revert "*)
              open_issue " (head is already a revert — loop guard)" \
                "The failed commit is itself a revert, so main was likely red for an unrelated reason. Auto-revert stood down to avoid a revert loop. Please investigate manually."
              exit 0
              ;;
          esac

          REVERT_ARGS=(--no-edit)
          if git rev-parse "${FAILED_SHA}^2" >/dev/null 2>&1; then
            REVERT_ARGS+=(-m 1)
          fi

          if ! git revert "${REVERT_ARGS[@]}" "$FAILED_SHA"; then
            git revert --abort 2>/dev/null || true
            open_issue " (revert conflicted)" \
              "Automatic \`git revert\` conflicted. Please revert manually."
            exit 0
          fi

          # Direct push to main. As the admin PAT this bypasses required checks;
          # the push re-triggers `ci`, which passes (the revert restores the
          # prior green state). Zero human touches.
          if ! git push origin HEAD:main; then
            open_issue " (push rejected)" \
              "The automatic revert could not be pushed to main. AUTO_REVERT_PAT may be missing, expired, or lack Contents/Workflows write. Please revert manually."
            exit 0
          fi

          echo "Reverted ${SHORT_SHA} directly on main; ci will re-run and go green."
