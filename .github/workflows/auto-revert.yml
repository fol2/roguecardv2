# Auto-revert safety net for the PR-smoke / main-full CI trade-off.
# When a push to main fails the full `ci` gate, revert it straight back to a
# green main with ZERO human touches — matching the trunk-flow philosophy.
#
# How the zero-touch path works (SDLC redesign Phase 3):
#   secrets.AUTO_REVERT_PAT is a PAT owned by the repo admin. Unlike
#   GITHUB_TOKEN it (a) re-triggers `ci` on its push, (b) can carry `workflow`
#   scope so it may revert .github/workflows changes, and (c) bypasses main's
#   required-status-checks because enforce_admins is false. So the revert
#   commit lands on main directly and `ci` re-runs on it (green — it restores
#   the prior state).
#
# Fallbacks stay honest — a human is pulled in only for the two cases a machine
# cannot resolve: a revert that CONFLICTS, and a red main whose head is ITSELF
# an auto-revert (the underlying red is not a single revertable commit — the
# loop guard turns this into an issue instead of reverting forever).
#
# If AUTO_REVERT_PAT is absent/expired, the push fails auth and we fall back to
# an issue — i.e. it degrades to the old semi-manual behaviour, never worse.

name: auto-revert

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  revert:
    name: revert failed main push
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      # De-fang: a red main whose ONLY failed leaf lane is `e2e aux` is the known
      # bfeditor disk-write flake (bfeditor-disk runs retries:0 and races a Vite
      # HMR restart on slow CI). Standing down here stops that flake from
      # false-reverting good work; a human is pulled in via an issue instead.
      - name: Stand down when only the known-flaky aux lane failed
        id: aux_guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          FAILED_RUN_URL: ${{ github.event.workflow_run.html_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Aggregate/gate jobs (unit, e2e, e2e nonvisual, p2-base) fail only as a
          # CONSEQUENCE of a leaf lane — subtract them so we compare real lanes.
          FAILED_LEAVES="$(gh api --paginate "repos/${REPO}/actions/runs/${RUN_ID}/jobs" \
            --jq '[.jobs[] | select(.conclusion=="failure") | .name] - ["unit","e2e","e2e nonvisual","p2-base"] | unique')"
          echo "failed leaf lanes: ${FAILED_LEAVES}"
          if [ "${FAILED_LEAVES}" = '["e2e aux"]' ]; then
            gh issue create --repo "${REPO}" \
              --title "main CI red — only the flaky e2e aux lane failed (no auto-revert)" \
              --body "The \`ci\` run failed on main but the ONLY failed leaf lane was \`e2e aux\` (the known bfeditor disk-write flake). Auto-revert stood down to avoid false-reverting good work. Assess manually: ${FAILED_RUN_URL}"
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.aux_guard.outputs.skip != 'true'
        with:
          ref: main
          fetch-depth: 0
          # PAT (not GITHUB_TOKEN) so the revert push re-triggers `ci`, may touch
          # workflow files, and bypasses branch protection as the admin owner.
          token: ${{ secrets.AUTO_REVERT_PAT }}
          persist-credentials: true

      - name: Revert the failed commit straight to main
        if: steps.aux_guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_SHA: ${{ github.event.workflow_run.head_sha }}
          FAILED_RUN_URL: ${{ github.event.workflow_run.html_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SHORT_SHA="${FAILED_SHA:0:7}"

          open_issue () {
            gh issue create --repo "$REPO" \
              --title "main CI red at ${SHORT_SHA} — manual revert needed$1" \
              --body "The \`ci\` workflow failed on main at \`${FAILED_SHA}\`.

          Failed run: ${FAILED_RUN_URL}

          $2"
          }

          git config user.name "auto-revert-bot"
          git config user.email "actions@github.com"

          # Loop guard: never auto-revert an auto-revert. If the failed head is
          # itself a revert, the underlying red is not a single revertable
          # commit — reverting it would re-apply the bad change and loop forever.
          SUBJECT="$(git log -1 --format=%s "$FAILED_SHA")"
          case "$SUBJECT" in
            "auto-revert:"* | "Revert "*)
              open_issue " (head is already a revert — loop guard)" \
                "The failed commit is itself a revert, so main was likely red for an unrelated reason. Auto-revert stood down to avoid a revert loop. Please investigate manually."
              exit 0
              ;;
          esac

          REVERT_ARGS=(--no-edit)
          if git rev-parse "${FAILED_SHA}^2" >/dev/null 2>&1; then
            REVERT_ARGS+=(-m 1)
          fi

          if ! git revert "${REVERT_ARGS[@]}" "$FAILED_SHA"; then
            git revert --abort 2>/dev/null || true
            open_issue " (revert conflicted)" \
              "Automatic \`git revert\` conflicted. Please revert manually."
            exit 0
          fi

          # Direct push to main. As the admin PAT this bypasses required checks;
          # the push re-triggers `ci`, which passes (the revert restores the
          # prior green state). Zero human touches.
          if ! git push origin HEAD:main; then
            open_issue " (push rejected)" \
              "The automatic revert could not be pushed to main. AUTO_REVERT_PAT may be missing, expired, or lack Contents/Workflows write. Please revert manually."
            exit 0
          fi

          echo "Reverted ${SHORT_SHA} directly on main; ci will re-run and go green."
